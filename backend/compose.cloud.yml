# Production-style stack: API only. Set DATABASE_URL (Neon), REDIS_URL (Redis Cloud),
# S3_* (R2), LIVEKIT_*, JWT_SECRET, ALLOWED_ORIGINS in .env (see .env.example).
#
# Usage: docker compose -f compose.cloud.yml --env-file .env up -d

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: riftapp-backend:local
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      PORT: "8080"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8080/api/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
