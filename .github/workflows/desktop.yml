name: Desktop Build

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/desktop.yml'

concurrency:
  group: desktop-release
  cancel-in-progress: false

permissions:
  contents: write

env:
  CSC_IDENTITY_AUTO_DISCOVERY: "false"

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      # Compute next version
      - name: Compute version
        id: version
        shell: pwsh
        working-directory: .
        run: |
          git fetch --tags --force origin | Out-Null

          $headTag = git tag --points-at HEAD --list "v*" |
            Sort-Object { [version]($_.TrimStart("v")) } -Descending |
            Select-Object -First 1

          if ($headTag) {
            $version = $headTag.TrimStart("v")
          } else {
            $remoteVersions = git ls-remote --tags --refs origin "v*" |
              ForEach-Object {
                $parts = $_ -split "`t"
                if ($parts.Length -eq 2) {
                  $parts[1] -replace "^refs/tags/v", ""
                }
              } |
              Where-Object { $_ } |
              Sort-Object { [version]$_ } -Descending

            if (-not $remoteVersions) {
              $version = "0.1.0"
            } else {
              $latest = [version]($remoteVersions | Select-Object -First 1)
              $version = "$($latest.Major).$($latest.Minor).$($latest.Build + 1)"
            }
          }

          Write-Host "Version: $version"
          "value=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      # Patch package.json
      - name: Patch package.json version
        shell: pwsh
        run: |
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $pkg.version = "${{ steps.version.outputs.value }}"
          $pkg | ConvertTo-Json -Depth 20 | Set-Content package.json -Encoding UTF8

      - run: npm ci --omit=optional --omit=peer

      # 🔥 Install Wrangler (NEW)
      - name: Install Wrangler
        run: npm install -g wrangler

      # Build app
      - name: Build Windows installer
        run: |
          npm run compile
          npm run icons
          npx electron-builder --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prune old R2 artifacts
        shell: bash
        run: |
          current_version="${{ steps.version.outputs.value }}"
          IFS='.' read -r major minor patch <<< "$current_version"

          if [ -z "$major" ] || [ -z "$minor" ] || [ -z "$patch" ]; then
            echo "Unable to parse version: $current_version"
            exit 1
          fi

          if [ "$patch" -lt 3 ]; then
            echo "Patch version $patch is less than 3; skipping prune."
            exit 0
          fi

          delete_patch=$((patch - 3))
          delete_version="$major.$minor.$delete_patch"

          echo "Keeping latest 3 versions including current build: $current_version"
          echo "Deleting old artifacts for $delete_version"

          wrangler r2 object delete "rift-updates/Rift Setup $delete_version.exe" --remote --force || true
          wrangler r2 object delete "rift-updates/Rift Setup $delete_version.exe.blockmap" --remote --force || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: b9d40635d63fcc6276423f6fa72f1b70

      # 🔥 Upload to R2 (NEW)
      - name: Upload artifacts to R2
        shell: bash
        run: |
          shopt -s nullglob
          artifacts=(
            dist-electron/latest.yml
            dist-electron/*.exe
            dist-electron/*.blockmap
          )

          for file in "${artifacts[@]}"; do
            [ -f "$file" ] || continue
            name=$(basename "$file")
            object_path="rift-updates/$name"
            echo "Uploading $name"
            wrangler r2 object put "$object_path" --file "$file" --remote
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: b9d40635d63fcc6276423f6fa72f1b70

      # Tag version
      - name: Create git tag
        shell: pwsh
        working-directory: .
        run: |
          git fetch --tags --force origin | Out-Null

          $tag = "v${{ steps.version.outputs.value }}"
          $headSha = (git rev-parse HEAD).Trim()
          $remoteSha = git ls-remote --tags --refs origin $tag |
            ForEach-Object { ($_ -split "`t")[0] } |
            Select-Object -First 1

          if ($remoteSha) {
            if ($remoteSha.Trim() -eq $headSha) {
              Write-Host "$tag already exists on origin for this commit; skipping tag creation."
              exit 0
            }

            throw "$tag already exists on origin for a different commit."
          }

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag $tag
          git push origin $tag

      # GitHub Release (optional but kept)
      - name: Create GitHub Release
        shell: pwsh
        working-directory: .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          function Invoke-Gh {
            param(
              [Parameter(ValueFromRemainingArguments = $true)]
              [string[]]$Arguments
            )

            & gh @Arguments
            if ($LASTEXITCODE -ne 0) {
              throw "gh $($Arguments -join ' ') failed with exit code $LASTEXITCODE"
            }
          }

          $tag = "v${{ steps.version.outputs.value }}"
          $title = "Rift v${{ steps.version.outputs.value }}"
          $notesPath = Join-Path $env:RUNNER_TEMP "rift-release-notes.md"

          @"
          Rift Desktop v${{ steps.version.outputs.value }}

          Download **Rift Setup ${{ steps.version.outputs.value }}.exe** below.
          "@ | Set-Content -Path $notesPath -Encoding UTF8

          $assetPatterns = @(
            "app/dist-electron/*.exe"
            "app/dist-electron/*.blockmap"
            "app/dist-electron/latest.yml"
          )

          $assets = foreach ($pattern in $assetPatterns) {
            Get-ChildItem -Path $pattern -File -ErrorAction SilentlyContinue |
              ForEach-Object { $_.FullName }
          }

          if (-not $assets) {
            throw "No release assets found."
          }

          & gh release view $tag *> $null
          $releaseExists = $LASTEXITCODE -eq 0

          if ($releaseExists) {
            Invoke-Gh release edit $tag --title $title --notes-file $notesPath
          } else {
            Invoke-Gh release create $tag --verify-tag --title $title --notes-file $notesPath
          }

          foreach ($asset in $assets) {
            Invoke-Gh release upload $tag $asset --clobber
          }
