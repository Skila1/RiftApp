name: Desktop Build

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/desktop.yml'

permissions:
  contents: write

env:
  CSC_IDENTITY_AUTO_DISCOVERY: "false"

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Compute next version
      - name: Compute version
        id: version
        shell: pwsh
        working-directory: .
        run: |
          $ErrorActionPreference = "SilentlyContinue"
          $tag = git describe --tags --abbrev=0 --match "v*" 2>&1
          $ErrorActionPreference = "Stop"
          if (-not $tag -or $tag -like "fatal:*") {
            $version = "0.1.0"
          } else {
            $parts = $tag.TrimStart("v").Split(".")
            $major = [int]$parts[0]
            $minor = [int]$parts[1]
            $patch = [int]$parts[2] + 1
            $version = "$major.$minor.$patch"
          }
          Write-Host "Version: $version"
          "value=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      # Patch package.json
      - name: Patch package.json version
        shell: pwsh
        run: |
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $pkg.version = "${{ steps.version.outputs.value }}"
          $pkg | ConvertTo-Json -Depth 20 | Set-Content package.json -Encoding UTF8

      - run: npm install

      # 🔥 Install Wrangler (NEW)
      - name: Install Wrangler
        run: npm install -g wrangler

      # Build app
      - name: Build Windows installer
        run: |
          npm run compile
          npm run icons
          npx electron-builder --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prune old R2 artifacts
        shell: bash
        run: |
          keep_count=2
          mapfile -t keep_versions < <(
            git tag --sort=-version:refname --list "v*" \
              | sed 's/^v//' \
              | head -n "$keep_count"
          )

          echo "Keeping previous versions in bucket: ${keep_versions[*]:-none}"
          echo "Keeping current build version in bucket: ${{ steps.version.outputs.value }}"

          while IFS= read -r version; do
            [ -n "$version" ] || continue

            skip=false
            for keep in "${keep_versions[@]}"; do
              if [ "$version" = "$keep" ]; then
                skip=true
                break
              fi
            done

            if [ "$skip" = true ]; then
              continue
            fi

            echo "Deleting old artifacts for $version"
            wrangler r2 object delete "rift-updates/Rift Setup $version.exe" --remote --force || true
            wrangler r2 object delete "rift-updates/Rift Setup $version.exe.blockmap" --remote --force || true
          done < <(
            git tag --sort=-version:refname --list "v*" | sed 's/^v//'
          )

          wrangler r2 object delete "rift-updates/builder-debug.yml" --remote --force || true
          wrangler r2 object delete "rift-updates/builder-effective-config.yaml" --remote --force || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: b9d40635d63fcc6276423f6fa72f1b70

      # 🔥 Upload to R2 (NEW)
      - name: Upload artifacts to R2
        shell: bash
        run: |
          shopt -s nullglob
          artifacts=(
            dist-electron/latest.yml
            dist-electron/*.exe
            dist-electron/*.blockmap
          )

          for file in "${artifacts[@]}"; do
            [ -f "$file" ] || continue
            name=$(basename "$file")
            object_path="rift-updates/$name"
            echo "Uploading $name"
            wrangler r2 object put "$object_path" --file "$file" --remote
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: b9d40635d63fcc6276423f6fa72f1b70

      # Tag version
      - name: Create git tag
        shell: pwsh
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.version.outputs.value }}"
          git push origin "v${{ steps.version.outputs.value }}"

      # GitHub Release (optional but kept)
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: Rift v${{ steps.version.outputs.value }}
          body: |
            Rift Desktop v${{ steps.version.outputs.value }}

            Download **Rift Setup ${{ steps.version.outputs.value }}.exe** below.
          files: |
            app/dist-electron/*.exe
            app/dist-electron/*.blockmap
            app/dist-electron/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
